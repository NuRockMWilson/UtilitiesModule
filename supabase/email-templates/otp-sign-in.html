<!--
  NuRock Utilities AP — OTP email template

  Paste the <body>...</body> contents into the Supabase dashboard:
    Authentication → Email Templates → Magic Link → Message Body (HTML)

  {{ .Token }} is replaced by Supabase with the 6-digit code.
  (The default template also includes a magic link — this strips it to code-only
   to match the new app UX.)
-->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NuRock Utilities AP sign-in</title>
</head>
<body style="margin:0; padding:0; background:#F6F3EA; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color:#1A2B3C;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#F6F3EA; padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="background:#ffffff; border:1px solid #E6E1D1; border-radius:6px; padding:40px;">
          <tr>
            <td>
              <h1 style="margin:0 0 4px; font-family: 'Oswald', 'Segoe UI', sans-serif; font-size:22px; font-weight:600; color:#164576;">
                NuRock
              </h1>
              <div style="font-size:12px; color:#7F7A5B; letter-spacing:0.5px; text-transform:uppercase; margin-bottom:28px;">
                Utilities AP
              </div>

              <h2 style="margin:0 0 12px; font-size:20px; font-weight:600; color:#1A2B3C;">
                Your sign-in code
              </h2>
              <p style="margin:0 0 24px; font-size:14px; color:#5C5849; line-height:1.5;">
                Enter this code in the NuRock Utilities AP sign-in screen to complete login.
              </p>

              <div style="background:#F6F3EA; border:1px solid #E6E1D1; border-radius:4px; padding:20px; text-align:center; margin-bottom:24px;">
                <div style="font-family: 'Courier New', monospace; font-size:36px; font-weight:600; letter-spacing:8px; color:#164576;">
                  {{ .Token }}
                </div>
              </div>

              <p style="margin:0 0 8px; font-size:13px; color:#7F7A5B;">
                This code expires in 10 minutes. If you didn't request it, you can safely ignore this email.
              </p>
            </td>
          </tr>
        </table>

        <p style="font-size:11px; color:#A8A38A; margin-top:20px;">
          NuRock Companies — Alpharetta, GA
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
